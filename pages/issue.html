<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light only" />
  <title>StockWise — Issue Stock</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/history.css" />
  <style>
    .cell-muted { color: var(--color-text-muted); font-size: 12px; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%; max-width: 640px;
      max-height: 88vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { margin: 0; font-size: 16px; }
    .modal-close {
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--color-text-muted);
    }
    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 10px 24px;
      font-size: 13px; color: var(--color-text-muted);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--color-border);
    }
    .table-loading, .table-empty {
      text-align: center; padding: 20px;
      color: var(--color-text-muted); font-size: 13px;
    }
  </style>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="../assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
</head>
<body>

  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <header class="page-header">
      <h2>Issue Stock <span class="page-tag page-tag--out">OUT</span></h2>
    </header>

    <div class="form-card" data-min-role="staff">
      <form id="issueForm">

        <!-- Department / Cost Centre -->
        <fieldset class="form-section">
          <legend>Receiving Department</legend>
          <div class="field-row">
            <div class="field-group" style="max-width:320px">
              <label>Department *</label>
              <select id="issueDepartment" required>
                <option value="">— Select department —</option>
              </select>
            </div>
          </div>
        </fieldset>

        <!-- Line Items -->
        <fieldset class="form-section">
          <legend>Items Issued</legend>
          <div class="line-items-table-wrap">
            <table class="data-table line-items-table" id="issueItemsTable">
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Product</th>
                  <th>Description</th>
                  <th>Available</th>
                  <th>Qty to Issue</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="issueItemsBody">
                <!-- Rows added by issue.js -->
              </tbody>
            </table>
          </div>
          <!-- Mobile card list (shown on small screens) -->
          <div class="line-items-cards" id="issueItemsCards"></div>
          <button type="button" class="btn-ghost btn-add-row" id="addIssueRow">+ Add Item</button>
          <p id="stockWarning" class="warning-msg hidden">
            ⚠ One or more items exceed available stock — please adjust quantities.
          </p>
        </fieldset>

        <div class="form-actions">
          <button type="button" class="btn-ghost" id="resetIssue">Clear Form</button>
          <button type="submit" class="btn-primary" id="submitIssue">Submit Issue</button>
        </div>
      </form>
    </div>

    <!-- Recent Issues -->
    <div class="form-card" style="margin-top:24px">
    <section class="section-block">
      <div class="section-header-row">
        <h3 class="section-title">Recent Issues</h3>
        <button id="exportIssuesBtn" class="btn-export-pdf" title="Download as PDF" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="13" height="13">
            <path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v4a2 2 0 002 2h1v1a1 1 0 001 1h8a1 1 0 001-1v-1h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9h8v3H6v-3zm8-5a1 1 0 110 2 1 1 0 010-2z" clip-rule="evenodd"/>
          </svg>
          PDF
        </button>
      </div>
      <div class="table-scroll-wrap" style="max-height:400px;overflow-y:auto;">
        <table class="data-table history-table" id="recentIssuesTable">
          <thead>
            <tr>
              <th>Issue No. / Product</th>
              <th>Date / Time</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Description / Issued By</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recentIssuesBody">
            <!-- Populated by issue.js -->
          </tbody>
        </table>
      </div>
    </section>
    </div>
  </main>

  <!-- Issue Detail Modal -->
  <div class="modal-overlay hidden" id="issueDetailModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="issueDetailTitle">Issue Detail</h3>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-ghost" id="printIssueBtn"
                  onclick="printCurrentIssue()"
                  style="font-size:13px;padding:6px 14px;">Print Receipt</button>
          <button class="modal-close"
                  onclick="document.getElementById('issueDetailModal').classList.add('hidden')">✕</button>
        </div>
      </div>
      <div id="issueDetailContent"></div>
    </div>
  </div>

  <!-- Firebase SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/role-gate.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script src="../js/print.js"></script>
  <script src="../js/searchable-select.js"></script>
  <script src="../js/issue.js"></script>
</body>
</html>
