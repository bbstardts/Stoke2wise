<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light only" />
  <title>StockWise — Login</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <h1>StockWise</h1>
      <p>Warehouse Management System</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div id="loginError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>

    <p class="auth-switch">
      <a href="#" id="forgotPasswordLink">Forgot password?</a>
    </p>

    <p class="auth-switch">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal hidden" id="forgotModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Reset your password</h3>
        <button type="button" class="modal-close" id="forgotClose">&times;</button>
      </div>
      <form id="forgotForm" class="modal-form">
        <div class="field-group">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" placeholder="you@company.com" required autocomplete="email" />
        </div>
        <div id="forgotMsg" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary" id="forgotBtn">Send Reset Link</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- EmailJS: sends YOU an alert when someone signs up -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/notify-config.js"></script>
  <script>
    if (window.NOTIFY_CONFIG && window.NOTIFY_CONFIG.enabled && typeof emailjs !== 'undefined') {
      emailjs.init(window.NOTIFY_CONFIG.publicKey);
    }
  </script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // Show a friendly banner if redirected here because an account is pending approval
    document.addEventListener('DOMContentLoaded', () => {
      if (new URLSearchParams(window.location.search).get('pending') === '1') {
        const box = document.getElementById('loginError');
        box.className = 'error-msg';
        box.textContent = 'Your account is awaiting admin approval. You will be able to sign in once it has been approved.';
        box.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
