<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/theme.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light dark" />
  <title>StockWise — Create Account</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#15803D">
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/theme-dark.css" />
  <link rel="stylesheet" href="css/ui-dialog.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
</head>
<body class="login-page">
  <button class="theme-toggle-btn auth-theme-toggle" data-theme-toggle title="Toggle theme">◐</button>

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <h1>StockWise</h1>
      <p>Create your account</p>
    </div>

    <div id="registerSuccess" class="success-msg hidden" style="margin-bottom:18px"></div>

    <form id="registerForm" class="login-form">
      <div class="field-group">
        <label for="displayName">Full Name</label>
        <input type="text" id="displayName" placeholder="Jane Smith" required autocomplete="name" />
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
      </div>
      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <div id="registerError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" id="googleSignInBtn" class="btn-ghost btn-social">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="" width="18" height="18" />
      Continue with Google
    </button>

    <p class="auth-switch">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>

  <!-- Complete Profile Modal (shown to brand-new Google sign-ups) -->
  <div class="modal hidden" id="completeProfileModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Finish creating your account</h3>
      </div>
      <form id="completeProfileForm" class="modal-form">
        <div class="field-group">
          <label for="cpFullName">Full Name</label>
          <input type="text" id="cpFullName" required autocomplete="name" />
        </div>
        <div id="cpError" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="cpCancelBtn">Cancel</button>
          <button type="submit" class="btn-primary" id="cpSubmitBtn">Finish & Submit for Approval</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Link Account Modal (shown when a Google sign-in matches an existing email/password account) -->
  <div class="modal hidden" id="linkAccountModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>This email already has an account</h3>
      </div>
      <p style="margin:0 0 14px;color:var(--text-muted,#666);font-size:14px" id="linkAccountMsg"></p>
      <form id="linkAccountForm" class="modal-form">
        <div class="field-group" id="linkEmailGroup">
          <label for="linkEmail">Email</label>
          <input type="email" id="linkEmail" placeholder="you@company.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="linkPassword">Enter your password to link Google sign-in</label>
          <input type="password" id="linkPassword" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="linkAccountError" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="linkAccountCancelBtn">Cancel</button>
          <button type="submit" class="btn-primary" id="linkAccountSubmitBtn">Link & Sign In</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- EmailJS: sends Bbstar a notification email on every new signup (see js/notify-config.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/notify-config.js"></script>
  <script>
    if (window.NOTIFY_CONFIG && window.NOTIFY_CONFIG.enabled && typeof emailjs !== 'undefined') {
      emailjs.init(window.NOTIFY_CONFIG.publicKey);
    }
  </script>

  <script src="js/firebase-config.js"></script>
  <script>
    // Same as index.html: skip the signup form entirely for a device that
    // already has a persisted session — this resolves from IndexedDB, no
    // network required.
    (function () {
      var auth = window.firebaseAuth;
      if (!auth) return;
      auth.onAuthStateChanged(function (user) {
        if (user) window.location.replace('pages/dashboard.html');
      });
    })();
  </script>
  <script src="js/ui-dialog.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
