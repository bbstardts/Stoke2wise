<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light only" />
  <title>StockWise — Create Account</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <h1>StockWise</h1>
      <p>Create your account</p>
    </div>

    <div id="registerSuccess" class="success-msg hidden" style="margin-bottom:18px"></div>

    <form id="registerForm" class="login-form">
      <div class="field-group">
        <label for="displayName">Full Name</label>
        <input type="text" id="displayName" placeholder="Jane Smith" required autocomplete="name" />
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
      </div>
      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <div id="registerError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>

  <!-- Firebase SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- EmailJS: sends Bbstar a notification email on every new signup (see js/notify-config.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/notify-config.js"></script>
  <script>
    if (window.NOTIFY_CONFIG && window.NOTIFY_CONFIG.enabled && typeof emailjs !== 'undefined') {
      emailjs.init(window.NOTIFY_CONFIG.publicKey);
    }
  </script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
